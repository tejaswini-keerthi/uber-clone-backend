# Alembic configuration. The DB URL is intentionally NOT set here — env.py
# pulls it from app.core.config (pydantic-settings) so there is one source of
# truth for connection details and secrets stay out of version control.
[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os
# Use a UTC timestamp + slug in revision filenames for readable history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
